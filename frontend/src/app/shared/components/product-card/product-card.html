  </div>
  <div class="product-card-image" style="background-image:
url({{serverStaticPath + product.image}})">
  </div>
  <div class="product-card-name">
    {{ product.name }}
  </div>
  <div class="product-card-info">
    <div class="product-card-price">
      {{ product.price }} BYN
    </div>
    <div class="product-card-action">
      <button class="button">В корзину</button>
    </div>
  </div>
  <div class="product-card-extra">
    <div class="product-card-count">
      <div>
        <svg width="10" height="3" viewBox="0 0 10 3" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M9.14019 3V0H0V3H9.14019Z" fill="#9AA89B"/>
      </svg>
      </div>
      <input type="text" class="small-input" [(ngModel)]="count">
      <div>
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M7.20871 12V7.20896H12V4.81343H7.20871V0H4.81307V4.81343H0V7.20896H4.81307V12H7.20871Z" fill="#9AA89B"/>
        </svg>
      </div>
    </div>
    <a [routerLink]='/product/' + product.url class="product-card-detail">
      <svg width="18" height="4" viewBox="0 0 18 4" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="2" cy="2" r="2" fill="#9AA89B"/>
        <circle cx="8.66699" cy="2" r="2" fill="#9AA89B"/>
        <circle cx="15.333" cy="2" r="2" fill="#9AA89B"/>
      </svg>
      <span>Подробнее</span>
    </a>
  </div>
</div>
